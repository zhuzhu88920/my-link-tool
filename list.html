<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>资源管理列表 - 页面2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .table-header { background: linear-gradient(90deg, #6366f1 0%, #a855f7 100%); }
    </style>
</head>
<body class="bg-gray-100 p-4 md:p-8">
    <div class="max-w-6xl mx-auto bg-white rounded-xl shadow-xl overflow-hidden">
        <div class="p-6 flex justify-between items-center border-b">
            <h1 class="text-2xl font-bold text-gray-800">资源链接列表</h1>
            <div class="flex gap-2">
                <button onclick="clearAll()" class="px-4 py-2 bg-red-100 text-red-600 rounded hover:bg-red-200 transition">清空全部</button>
                <a href="index.html" class="px-4 py-2 bg-indigo-600 text-white rounded hover:bg-indigo-700 transition">返回导入</a>
            </div>
        </div>
        
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead class="table-header text-white">
                    <tr>
                        <th class="p-4 font-semibold">序号</th>
                        <th class="p-4 font-semibold">简称</th>
                        <th class="p-4 font-semibold">商品标题</th>
                        <th class="p-4 font-semibold">原始链接</th>
                        <th class="p-4 font-semibold">带Emoji的链接</th>
                    </tr>
                </thead>
                <tbody id="dataTable" class="divide-y divide-gray-200">
                    <!-- 数据将通过 JS 渲染 -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        function loadData() {
            const data = JSON.parse(localStorage.getItem('my_shared_data') || '[]');
            const tbody = document.getElementById('dataTable');
            
            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="p-10 text-center text-gray-400">暂无数据，请先从页面1导入</td></tr>`;
                return;
            }

            tbody.innerHTML = data.map((item, index) => `
                <tr class="hover:bg-gray-50 transition">
                    <td class="p-4 text-indigo-600 font-bold text-center">${index + 1}</td>
                    <td class="p-4 font-medium text-gray-700">${item.name}</td>
                    <td class="p-4 text-gray-500 text-sm max-w-xs">${item.title}</td>
                    <td class="p-4">
                        <div class="flex items-center gap-2">
                            <input readonly value="${item.originalLink}" class="bg-gray-50 border border-gray-200 rounded p-1 text-xs w-32 outline-none">
                            <button onclick="copyText('${item.originalLink}')" class="bg-gray-500 text-white text-xs px-2 py-1 rounded hover:bg-gray-600">复制</button>
                        </div>
                    </td>
                    <td class="p-4">
                        <div class="flex items-center gap-2">
                            <input readonly value="${item.modifiedLink}" class="bg-gray-50 border border-gray-200 rounded p-1 text-xs w-48 outline-none font-bold text-indigo-700">
                            <button onclick="copyText('${item.modifiedLink}')" class="bg-indigo-600 text-white text-xs px-2 py-1 rounded hover:bg-indigo-700 flex items-center gap-1">
                                📋 复制
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function copyText(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert('链接已复制到剪贴板');
            });
        }

        function clearAll() {
            if(confirm('确定要清空所有数据吗？')) {
                localStorage.removeItem('my_shared_data');
                loadData();
            }
        }

        // 页面加载时执行
        loadData();
    </script>
</body>
</html>
